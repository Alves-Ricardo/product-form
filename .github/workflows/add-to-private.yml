name: Add Products to Private Repo

on:
  issues:
    types: [opened, reopened]

jobs:
  add-products:
    runs-on: ubuntu-latest
    
    steps:
      - name: Check if auto-add issue
        id: check
        run: |
          if [[ "${{ github.event.issue.title }}" == *"Add Product"* ]]; then
            echo "is_auto_add=true" >> $GITHUB_OUTPUT
          else
            echo "is_auto_add=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Extract URLs from issue
        if: steps.check.outputs.is_auto_add == 'true'
        id: extract
        run: |
          URLS=$(echo "${{ github.event.issue.body }}" | grep -oE 'https?://[^\s]+' || echo "")
          
          echo "urls<<EOF" >> $GITHUB_OUTPUT
          echo "$URLS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
          if [ -z "$URLS" ]; then
            COUNT=0
          else
            COUNT=$(echo "$URLS" | grep -c "^" || echo "0")
          fi
          echo "count=$COUNT" >> $GITHUB_OUTPUT
          
          echo "Found $COUNT URL(s)"
      
      - name: Add to private repo
        if: steps.check.outputs.is_auto_add == 'true' && steps.extract.outputs.count > 0
        env:
          GITHUB_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
          PRIVATE_REPO: ${{ secrets.PRIVATE_REPO }}
        run: |
          OWNER=$(echo "$PRIVATE_REPO" | cut -d'/' -f1)
          REPO=$(echo "$PRIVATE_REPO" | cut -d'/' -f2)
          
          echo "Adding to $OWNER/$REPO"
          
          RESPONSE=$(curl -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$OWNER/$REPO/contents/products.txt")
          
          SHA=$(echo "$RESPONSE" | jq -r '.sha')
          CURRENT_CONTENT=$(echo "$RESPONSE" | jq -r '.content' | base64 -d || echo "")
          
          NEW_CONTENT="${CURRENT_CONTENT}
          ${{ steps.extract.outputs.urls }}"
          
          ENCODED_CONTENT=$(echo "$NEW_CONTENT" | base64 -w 0)
          
          STATUS=$(curl -X PUT \
            -w "%{http_code}" \
            -o /dev/null \
            -s \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/$OWNER/$REPO/contents/products.txt" \
            -d '{"message":"Add products from form","content":"'"$ENCODED_CONTENT"'","sha":"'"$SHA"'"}')
          
          if [ "$STATUS" -eq 200 ] || [ "$STATUS" -eq 201 ]; then
            echo "Successfully added products!"
          else
            echo "Failed with status: $STATUS"
            exit 1
          fi
      
      - name: Comment and close issue
        if: steps.check.outputs.is_auto_add == 'true' && steps.extract.outputs.count > 0
        uses: actions/github-script@v6
        with:
          script: |
            const count = '${{ steps.extract.outputs.count }}';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `✅ **Success!** ${count} product(s) have been added to your private tracker.\n\n🔄 They will be tracked in the next scheduled price check (runs daily).\n\n---\n*This issue was automatically processed and closed.*`
            });
            
            await github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            });
            
            await github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ['completed']
            });
      
      - name: Comment on non-product issue
        if: steps.check.outputs.is_auto_add == 'false'
        uses: actions/github-script@v6
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'ℹ️ This issue does not appear to be a product submission. No action taken.'
            });
